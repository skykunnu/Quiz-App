<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script src="https://kit.fontawesome.com/30dda9e3f8.js" crossorigin="anonymous"></script>
    <script src="./script.js" defer></script>
    <title>Quiz App</title>
    
</head>
<body>
 
<div class="start_btn"><button>Start-Quiz</button></div>

<!-- Quiz box -->
 <div class="quiz_box">
    <header>
        <div class="title">Awesome Quiz Application</div>
        <div class="timer">
            <div class="time_text">Time Left</div>
            <div class="timer_sec">10</div>
        </div>
    </header>
    <hr>
    <section>
        <div class="que_text">
            <!-- <span>What does HTML stands for</span> -->
        </div>
        <div class="option_list">
            <!-- <div class="option">
                <span>Hyper text processor</span>
                <div class="icon tick"><i class="fas fa-check"></i></div>
            </div>
            <div class="option">
                <span>Hyper text Markup Language</span>
                <div class="icon cross"><i class="fas fa-times"></i></div>
            </div>
            <div class="option">
                <span>Hyper text Multiple Language</span>
            </div>
            <div class="option">
                <span>Hyper tool Multi Language</span>
            </div> -->
        </div>
    </section>

<footer>
<div class="total_que">
<!-- <span><p>2</p>Of<p>5</p>Questions</span> -->
</div>
<button class="next_btn">Next Que</button>
</footer>
 </div>

 <!-- result -->
<div class="result_box">
    <div class="icon"><i class="fas fa-crown"></i></div>
    <div class="complete_text">You've completed the Quiz!</div>
    <div class="score_text">
        <span>and sorry, You got only<p>2</p>out of <p>5</p></span>
    </div>
    <div class="buttons">
        <button class="quit">Quit quiz</button>
    </div>
</div>


</body>
</html>
